<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border: 5px solid red;
            border-collapse: inherit;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        .numero {
            vertical-align: text-top;
        }
    </style>
</head>
<body>
    <h1>minha primeira tabela</h1>
    <!-- 
    
    hierarquia de tabelas

    table = tabela
    table row = linha de tabela
    table header = cabeçalho de tabela
    table data = data da tabela
    
    -->
    <table>
        <tr> <!-- primeiro titulo-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
            <td class="numero">67</td>
        </tr>
    </table>
</body>
</html>

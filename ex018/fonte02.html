<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fontes externas</title>
    <style>
        @font-face {
            font-family: 'children writing';
            src: url("fonts/Chomage.otf") format("opentype"), url("fonts/Chomage.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;

            /*
             tipos de format()
             - opentype (otf)
             - truetype (ttf)
             - embedopentype 
             - truetype-aat (apple advenced typegraphy)
             - svg
             */
        }
        body {
            font-family: 'children writing';
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>titulo</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Esse laudantium tenetur minima maiores enim corporis, assumenda quisquam voluptas natus ex dolorum dolore blanditiis eveniet repellat omnis explicabo reiciendis, non nisi!</p>
</body>
</html>

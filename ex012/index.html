<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>videos com HTML5</title>
</head>
<body>
    <h1>inserindo videos hospedados localmente</h1>
    <p>este video esta hospedado no meu prorpio servidor</p>
    <video width="560" height="315" poster="imagens/itadori.png.png" controls>
        <source src="midia/Meu Video.Mp4.mp4" type="video/mp4">
        <source src="midia/meu_video.mp4.mp4" type="video/WeBm">
        <p>seu navegador ou dispositivo nao consegue reproduzir videos.</p>
    </video>
    <h1>inserindo videos do youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/ibPvSS41nW8?si=xMecbvI5hBtiKEh6" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>

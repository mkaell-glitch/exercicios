<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem de fundo</title>
    <style>
        body {
            background-image: url('imagens/pattern004.png');
        }
        div.quadrada {
            display: inline-block;
            border: 2px solid black;
            border-radius: 3px;
            background-color: gray;
            width: 300px;
            height: 300px;
        }
        div#q1 {
            background-color: skyblue;
        }

        div#q2 {
            background-image: linear-gradient(to bottom ,red, purple);
        }

        div#q3 {
            background-image: url("imagens/pattern003.png");
        }
    </style>
</head>
<body>
    <div class="quadrada" id="q1"></div>

    <div class="quadrada" id="q2"></div>

    <div class="quadrada" id="q3"></div>

</body>
</html>
